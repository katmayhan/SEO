[build]
  publish = "public"
  functions = "netlify/functions"

[functions."gsc-sync"]
  schedule = "0 6 * * *"

[functions."measure-impact"]
  schedule = "0 7 * * *"

[[redirects]]
  from = "/auth/callback"
  to = "/auth-callback.html"
  status = 200

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
